<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found | CloudCrackers</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="../icons/favicon.ico">
</head>
<body>
<div class="auth-page">
    <div class="auth-visual">
        <div>
            <span class="eyebrow">Lost Spark</span>
            <h2>
                Light Your Way
                <span class="highlight">Back Home</span>
            </h2>
        </div>
    </div>
    <div class="auth-form-side">
        <div class="auth-card" style="text-align: center;">
            <a href="../index.html" class="auth-brand">
                <span class="logo-text">
                    Cloud<em>Crackers</em>
                </span>
            </a>
            
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 64px; color: var(--gold); margin-bottom: 24px;"></i>
            
            <h1>404 Page Not Found</h1>
            <p class="muted-text" style="margin-bottom: 30px;">
                The page you are looking for has fizzled out or never existed. Let's redirect you back to the festivities.
            </p>
            
            <a href="../index.html" class="btn btn-primary btn-block" style="width:100%;">Return to Homepage</a>
            
            <p class="auth-switch">
                Need help?
                <a href="../index.html#contact">Support</a>
            </p>
        </div>
    </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
