<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | CloudCrackers Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="../icons/favicon.ico">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--sky-800);
            border: 1px solid var(--sky-line);
            border-radius: var(--radius-md);
            padding: 24px;
            width: 90%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        #toastContainer {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="admin-body">
        <aside class="admin-sidebar">
            <a href="admin-dashboard.html"><span class="logo-text">Cloud<em>Crackers</em></span></a>
            <nav class="admin-nav">
                <div class="nav-label">Main</div>
                <a href="admin-dashboard.html" class=""><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="admin-orders.html" class=""><i class="fa-solid fa-box"></i> Orders</a>
                <a href="admin-products.html" class=""><i class="fa-solid fa-fire"></i> Products</a>
                <a href="admin-categories.html" class=""><i class="fa-solid fa-tags"></i> Categories</a>
                <a href="admin-users.html" class="active"><i class="fa-solid fa-users"></i> Users</a>
                <div class="nav-label">Settings</div>
                <a href="admin-profile.html" class=""><i class="fa-solid fa-user-gear"></i> Profile</a>
                <a href="admin-settings.html" class=""><i class="fa-solid fa-gears"></i> App Settings</a>
                <div class="nav-label">Other</div>
                <a href="../index.html"><i class="fa-solid fa-store"></i> View Store</a>
            </nav>
            <div class="admin-sidebar-foot">
                <div class="profile-nav"><a href="#" id="logoutLink"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a></div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <h1>Manage Users</h1>
                <div class="admin-topbar-right">
                    <i class="fa-regular fa-bell" style="color:var(--muted); cursor:pointer;"></i>
                    <div class="table-avatar" id="adminAvatarHeader">AK</div>
                </div>
            </div>
            <div class="admin-content">
                <div class="search-filter-bar">
                    <input class="form-control" type="text" id="searchUsers" placeholder="Search users by name or email...">
                    <select class="form-control" id="filterRole" style="width:160px;">
                        <option value="">All Roles</option>
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                    <select class="form-control" id="filterStatus" style="width:160px;">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="blocked">Blocked</option>
                    </select>
                </div>

                <div class="card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Verified</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="8" style="text-align:center; padding:32px;"><i class="fa-solid fa-spinner fa-spin" style="font-size:24px; color:var(--gold);"></i><div style="margin-top:8px; color:var(--muted);">Loading users...</div></td></tr>
                        </tbody>
                    </table>
                    <div class="pagination" id="usersPagination" style="padding:16px;"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- User Action Modal (Role / Reset Password) -->
    <div id="userActionModal" class="modal">
        <div class="modal-content">
            <button id="closeUserActionModal" style="position:absolute; top:16px; right:16px; color:var(--muted); font-size:20px; background:none; border:none; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
            <h2 style="font-family:var(--font-display); font-size:15px; margin-bottom:16px;">Manage User Actions</h2>
            <form id="userActionForm">
                <input type="hidden" id="manageUserId">
                <div class="form-group" style="margin-bottom:16px;">
                    <label style="display:block; margin-bottom:6px; font-size:12.5px;">User Role</label>
                    <select id="userRoleSelect" class="form-control" required>
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:20px; padding:12px; background:rgba(0,0,0,0.15); border:1px solid var(--sky-line); border-radius:4px;">
                    <label style="display:block; margin-bottom:6px; font-size:12.5px; font-weight:600; color:var(--gold);">Reset Password Area</label>
                    <input type="password" id="userNewPassword" class="form-control" placeholder="Enter new password..." style="margin-bottom:10px; font-size:12.5px;">
                    <button type="button" class="btn btn-outline btn-sm btn-block" id="resetPasswordBtn" style="font-size:11.5px; padding:8px 12px;">Trigger Password Reset</button>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:12px;">
                    <button type="button" id="cancelUserActionBtn" class="btn btn-outline" style="padding: 8px 16px; font-size:12.5px;">Cancel</button>
                    <button type="submit" id="saveUserActionBtn" class="btn btn-primary" style="padding: 8px 16px; font-size:12.5px;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer"></div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/components/toast.js"></script>
    <script src="../js/components/modal.js"></script>
    <script src="../js/components/loader.js"></script>
    <script src="../js/components/pagination.js"></script>
    <script src="../js/helpers/format.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/pages/users.js"></script>
</body>
</html>
