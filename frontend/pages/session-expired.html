<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired | CloudCrackers</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="../icons/favicon.ico">
</head>
<body>
<div class="auth-page">
    <div class="auth-visual">
        <div>
            <span class="eyebrow">Flame Out</span>
            <h2>
                Reignite Your
                <span class="highlight">Session</span>
            </h2>
        </div>
    </div>
    <div class="auth-form-side">
        <div class="auth-card" style="text-align: center;">
            <a href="../index.html" class="auth-brand">
                <span class="logo-text">
                    Cloud<em>Crackers</em>
                </span>
            </a>
            
            <i class="fa-regular fa-clock" style="font-size: 64px; color: var(--gold); margin-bottom: 24px;"></i>
            
            <h1>Session Expired</h1>
            <p class="muted-text" style="margin-bottom: 30px;">
                To safeguard your checkout details and personal information, your session was automatically timed out.
            </p>
            
            <a href="login.html" class="btn btn-primary btn-block" style="width:100%;">Log In Again</a>
            
            <p class="auth-switch">
                Want to browse first?
                <a href="../index.html">View Store</a>
            </p>
        </div>
    </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
