<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | CloudCrackers</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="../icons/favicon.ico">
</head>
<body>
<div class="auth-page">
    <div class="auth-visual">
        <div>
            <span class="eyebrow">Recover Account</span>
            <h2>
                Get Back To Your
                <span class="highlight">Celebrations</span>
            </h2>
        </div>
    </div>
    <div class="auth-form-side">
        <div class="auth-card">
            
            <!-- Skeleton Loader -->
            <div class="skeleton-wrapper" id="authSkeleton">
                <div class="skeleton sk-title"></div>
                <div class="skeleton sk-text"></div>
                <div class="skeleton sk-label"></div>
                <div class="skeleton sk-input"></div>
                <div class="skeleton sk-button"></div>
            </div>

            <!-- Main Content -->
            <div class="auth-card-content" id="authContent">
                <a href="../index.html" class="auth-brand" aria-label="Go to CloudCrackers Home">
                    <span class="logo-text">
                        Cloud<em>Crackers</em>
                    </span>
                </a>
                
                <h1>Forgot Password</h1>
                <p class="muted-text">
                    Enter your email address to receive a secure password reset link.
                </p>

                <form id="forgotPasswordForm" novalidate>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fa-regular fa-envelope input-icon" aria-hidden="true"></i>
                            <input type="email" id="email" class="form-control" placeholder="you@example.com" required aria-required="true" autocomplete="email">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="width:100%; margin-top: 15px;">Send Reset Link</button>
                </form>
                
                <p class="auth-switch">
                    Remember your password?
                    <a href="login.html">Log In</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
